name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Add upstream
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Anionex/banana-slides.git

      - name: Sync main from upstream
        run: |
          git fetch upstream main
          git checkout main
          git merge --ff-only upstream/main

      - name: Push changes
        run: git push origin main
