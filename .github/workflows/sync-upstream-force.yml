name: Sync Upstream (Force)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-force:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Add upstream
        run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Anionex/banana-slides.git

      - name: Force sync main to upstream/main
        run: |
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main

      - name: Force push to origin main
        run: git push origin main --force-with-lease
